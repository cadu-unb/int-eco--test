<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Favoritos — SABER UnB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Vars ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --verde: #006039; --verde-light: #007a49; --verde-pale: #e8f5ee;
      --azul: #004D80;  --azul-pale: #e6f0f8;
      --offwhite: #f8f9fa; --white: #fff;
      --text-dark: #1a2332; --text-mid: #4a5568; --text-light: #8a9ab0;
      --border: #e2e8f0;
      --gold: #c8961c; --gold-pale: #fef9e7;
      --radius-sm: 10px; --radius-md: 16px; --radius-lg: 24px;
      --shadow-sm: 0 2px 8px rgba(0,0,0,.06);
      --shadow-md: 0 6px 24px rgba(0,0,0,.10);
      --t: .22s cubic-bezier(.4,0,.2,1);
    }
    html { font-size: 16px; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--offwhite);
      color: var(--text-dark);
      min-height: 100dvh;
    }

    /* ── Header ── */
    .fav-header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex; align-items: center; gap: 14px;
      position: sticky; top: 0; z-index: 20;
    }
    .btn-back {
      width: 40px; height: 40px; border-radius: 50%;
      border: 1.5px solid var(--border); background: transparent;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text-dark); flex-shrink: 0;
      transition: border-color var(--t), background var(--t), color var(--t);
      text-decoration: none;
    }
    .btn-back:hover { border-color: var(--verde); background: var(--verde-pale); color: var(--verde); }
    .header-brand { display: flex; align-items: baseline; gap: 4px; }
    .brand-saber {
      font-family: 'Fraunces', serif; font-size: 1.4rem; font-weight: 900;
      background: linear-gradient(135deg, var(--verde), var(--azul));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .brand-unb { font-size: .9rem; font-weight: 600; color: var(--text-mid); }
    .header-title { font-size: 1rem; font-weight: 600; color: var(--text-mid); margin-left: 4px; }

    /* ── Toolbar ── */
    .toolbar {
      max-width: 800px; margin: 0 auto;
      padding: 20px 24px 0;
      display: flex; flex-wrap: wrap; align-items: center; gap: 12px;
    }
    .toolbar-title {
      font-family: 'Fraunces', serif;
      font-size: clamp(1.6rem, 4vw, 2.2rem); font-weight: 900;
      line-height: 1.1; flex: 1 0 100%;
    }
    .toolbar-title span {
      background: linear-gradient(135deg, var(--gold), #e6a820);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    .view-tabs {
      display: flex; gap: 6px;
      background: var(--offwhite); border: 1px solid var(--border);
      padding: 4px; border-radius: 100px;
    }
    .view-tab {
      padding: 7px 18px; border-radius: 100px; border: none;
      background: transparent; cursor: pointer;
      font-family: 'DM Sans', sans-serif; font-size: .85rem; font-weight: 600;
      color: var(--text-mid); transition: all var(--t);
      display: flex; align-items: center; gap: 6px;
    }
    .view-tab.active { background: var(--white); color: var(--text-dark); box-shadow: var(--shadow-sm); }
    .view-tab .tab-count {
      background: var(--gold-pale); color: var(--gold);
      font-size: .72rem; font-weight: 700;
      padding: 1px 7px; border-radius: 100px;
    }
    .view-tab.active .tab-count { background: var(--gold); color: white; }

    .search-wrap {
      flex: 1; min-width: 200px;
      position: relative;
    }
    .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-light); pointer-events: none; }
    .search-input {
      width: 100%; padding: 10px 12px 10px 38px;
      border: 1.5px solid var(--border); border-radius: 100px;
      background: var(--white); font-family: 'DM Sans', sans-serif;
      font-size: .9rem; color: var(--text-dark); outline: none;
      transition: border-color var(--t);
    }
    .search-input:focus { border-color: var(--verde); }
    .search-input::placeholder { color: var(--text-light); }

    .filter-chips {
      display: flex; gap: 8px; flex-wrap: wrap; flex: 1 0 100%;
    }
    .filter-chip {
      padding: 5px 14px; border-radius: 100px;
      border: 1.5px solid var(--border); background: var(--white);
      font-size: .8rem; font-weight: 600; color: var(--text-mid);
      cursor: pointer; transition: all var(--t);
    }
    .filter-chip.active { border-color: var(--verde); background: var(--verde-pale); color: var(--verde); }

    /* ── Main content ── */
    .fav-main {
      max-width: 800px; margin: 0 auto;
      padding: 20px 24px 60px;
      display: flex; flex-direction: column; gap: 12px;
    }

    .empty-state {
      text-align: center; padding: 60px 20px;
      color: var(--text-light);
    }
    .empty-state svg { margin-bottom: 16px; opacity: .35; }
    .empty-state p { font-size: 1rem; line-height: 1.6; }
    .empty-state strong { color: var(--text-mid); }

    /* ── Question Card ── */
    .q-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      transition: box-shadow var(--t), border-color var(--t);
    }
    .q-card:hover { box-shadow: var(--shadow-md); }
    .q-card.favorited { border-color: var(--gold); }

    .q-card-top {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 18px 18px 14px;
    }
    .q-card-meta {
      flex: 1;
    }
    .q-card-tags {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px;
    }
    .tag-chapter {
      font-size: .72rem; font-weight: 700; letter-spacing: .05em; text-transform: uppercase;
      background: var(--verde-pale); color: var(--verde);
      padding: 3px 10px; border-radius: 100px;
    }
    .tag-id {
      font-size: .72rem; font-weight: 600; color: var(--text-light);
      padding: 3px 0;
    }
    .q-command {
      font-size: .95rem; line-height: 1.6; color: var(--text-dark); font-weight: 500;
    }

    /* Star button */
    .btn-star {
      width: 40px; height: 40px; flex-shrink: 0; border-radius: 50%;
      border: 1.5px solid var(--border); background: transparent;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all var(--t);
      color: var(--text-light);
    }
    .btn-star:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-pale); }
    .btn-star.starred { border-color: var(--gold); background: var(--gold-pale); color: var(--gold); }
    .btn-star.starred svg { fill: var(--gold); }

    /* Expand toggle */
    .q-expand-toggle {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 18px;
      border-top: 1px solid var(--border);
      background: none; border-bottom: none; border-left: none; border-right: none;
      width: 100%; cursor: pointer;
      font-family: 'DM Sans', sans-serif; font-size: .82rem; font-weight: 600;
      color: var(--text-mid); text-align: left;
      transition: background var(--t), color var(--t);
    }
    .q-expand-toggle:hover { background: var(--offwhite); color: var(--verde); }
    .q-expand-toggle .toggle-icon {
      margin-left: auto;
      transition: transform var(--t);
    }
    .q-expand-toggle.open .toggle-icon { transform: rotate(180deg); }

    /* Alternatives */
    .q-details {
      display: none;
      padding: 0 18px 18px;
      border-top: 1px solid var(--border);
    }
    .q-details.open { display: block; }

    .alt-list {
      list-style: none;
      display: flex; flex-direction: column; gap: 8px;
      padding: 14px 0 10px;
    }
    .alt-row {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px 12px; border-radius: var(--radius-sm);
      font-size: .88rem; line-height: 1.5; color: var(--text-mid);
      background: var(--offwhite);
    }
    .alt-row.correct-alt {
      background: var(--verde-pale); color: var(--text-dark); font-weight: 500;
    }
    .alt-badge {
      width: 26px; height: 26px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: .75rem; flex-shrink: 0;
      background: var(--border); color: var(--text-mid);
    }
    .alt-row.correct-alt .alt-badge { background: var(--verde); color: white; }

    .justification-box {
      margin-top: 2px;
      padding: 12px 14px;
      background: var(--azul-pale);
      border-left: 3px solid var(--azul);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      font-size: .83rem; color: var(--text-mid); line-height: 1.6;
    }
    .just-label {
      font-weight: 700; color: var(--azul);
      font-size: .75rem; text-transform: uppercase; letter-spacing: .04em;
      margin-bottom: 4px;
    }

    /* ── Chapter separator ── */
    .chapter-sep {
      display: flex; align-items: center; gap: 12px;
      margin: 8px 0 4px;
    }
    .chapter-sep-line { flex: 1; height: 1px; background: var(--border); }
    .chapter-sep-label {
      font-size: .78rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
      color: var(--text-light); white-space: nowrap;
    }

    /* ── Loader ── */
    .loader-overlay {
      position: fixed; inset: 0;
      background: rgba(248,249,250,.92); backdrop-filter: blur(6px);
      display: none; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; z-index: 999; font-size: .95rem; color: var(--text-mid);
    }
    .loader-overlay.visible { display: flex; }
    .loader-spinner {
      width: 44px; height: 44px;
      border: 3px solid var(--border); border-top-color: var(--verde);
      border-radius: 50%; animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .q-card { animation: fadeUp .25s ease both; }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .toolbar { padding: 16px 16px 0; }
      .fav-main { padding: 16px 16px 60px; }
      .fav-header { padding: 14px 16px; }
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="fav-header">
    <a href="index.html" class="btn-back" title="Voltar ao início">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M16 10H4M10 4l-6 6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
    <div class="header-brand">
      <span class="brand-saber">SABER</span>
      <span class="brand-unb">UnB</span>
    </div>
    <span class="header-title">/ Favoritos</span>
  </header>

  <!-- Toolbar -->
  <div class="toolbar" id="toolbar">
    <h1 class="toolbar-title">Banco de <span>Questões</span></h1>

    <!-- Tabs Todas / Favoritas -->
    <div class="view-tabs" id="view-tabs">
      <button class="view-tab active" data-tab="all">
        Todas
        <span class="tab-count" id="count-all">0</span>
      </button>
      <button class="view-tab" data-tab="fav">
        ★ Favoritas
        <span class="tab-count" id="count-fav">0</span>
      </button>
    </div>

    <!-- Busca -->
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 20 20" fill="none"><circle cx="8.5" cy="8.5" r="5.5" stroke="currentColor" stroke-width="1.8"/><path d="M13 13l3.5 3.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <input type="search" class="search-input" id="search-input" placeholder="Buscar questão…" />
    </div>

    <!-- Chips de capítulo -->
    <div class="filter-chips" id="filter-chips"></div>
  </div>

  <!-- Main -->
  <main class="fav-main" id="fav-main"></main>

  <!-- Loader -->
  <div class="loader-overlay visible" id="loader">
    <div class="loader-spinner"></div>
    <p>Carregando questões…</p>
  </div>

  <script>
  'use strict';

  const STORAGE_KEY = 'saber_unb_favoritos';

  // ── Estado ──────────────────────────────
  let allQuestions = [];   // [{uid, chapterId, chapterName, command, alternatives, answer, justification}]
  let favorites    = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));
  let activeTab    = 'all';
  let activeChapter = null;
  let searchQuery  = '';

  // ── Persistência ────────────────────────
  function saveFavorites() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify([...favorites]));
  }

  // ── Load JSON ───────────────────────────
  async function loadData() {
    try {
      const res = await fetch('json/questions.json');
      if (!res.ok) throw new Error();
      const data = await res.json();
      allQuestions = [];

      Object.entries(data).forEach(([chapId, chapter]) => {
        Object.entries(chapter.questions || {}).forEach(([qId, q]) => {
          allQuestions.push({
            uid: `${chapId}__${qId}`,
            chapterId: Number(chapId),
            chapterName: chapter.name || `Capítulo ${chapId}`,
            ...q,
          });
        });
      });

      buildChapterChips();
      render();
    } catch {
      document.getElementById('fav-main').innerHTML = `
        <div class="empty-state">
          <p>Não foi possível carregar as questões.<br>Verifique se <strong>json/questions.json</strong> existe.</p>
        </div>`;
    } finally {
      document.getElementById('loader').classList.remove('visible');
    }
  }

  // ── Chapter chips ───────────────────────
  function buildChapterChips() {
    const chapters = [...new Map(allQuestions.map(q => [q.chapterId, q.chapterName])).entries()]
      .sort((a, b) => a[0] - b[0]);

    const container = document.getElementById('filter-chips');
    container.innerHTML = '';

    chapters.forEach(([id, name]) => {
      const btn = document.createElement('button');
      btn.className = 'filter-chip';
      btn.textContent = `Cap. ${id}`;
      btn.title = name;
      btn.dataset.chap = id;
      btn.addEventListener('click', () => {
        activeChapter = (activeChapter === id) ? null : id;
        document.querySelectorAll('.filter-chip').forEach(c =>
          c.classList.toggle('active', Number(c.dataset.chap) === activeChapter));
        render();
      });
      container.appendChild(btn);
    });
  }

  // ── Filter & render ─────────────────────
  function getFiltered() {
    return allQuestions.filter(q => {
      if (activeTab === 'fav' && !favorites.has(q.uid)) return false;
      if (activeChapter !== null && q.chapterId !== activeChapter) return false;
      if (searchQuery) {
        const needle = searchQuery.toLowerCase();
        const haystack = (q.command + ' ' + q.alternatives.join(' ')).toLowerCase();
        if (!haystack.includes(needle)) return false;
      }
      return true;
    });
  }

  function updateCounts() {
    const filtered     = getFiltered();
    const totalAll     = allQuestions.filter(q => {
      if (activeChapter !== null && q.chapterId !== activeChapter) return false;
      if (searchQuery) {
        const needle = searchQuery.toLowerCase();
        const haystack = (q.command + ' ' + q.alternatives.join(' ')).toLowerCase();
        if (!haystack.includes(needle)) return false;
      }
      return true;
    }).length;
    const totalFav = allQuestions.filter(q => {
      if (!favorites.has(q.uid)) return false;
      if (activeChapter !== null && q.chapterId !== activeChapter) return false;
      if (searchQuery) {
        const needle = searchQuery.toLowerCase();
        const haystack = (q.command + ' ' + q.alternatives.join(' ')).toLowerCase();
        if (!haystack.includes(needle)) return false;
      }
      return true;
    }).length;

    document.getElementById('count-all').textContent = totalAll;
    document.getElementById('count-fav').textContent = totalFav;
  }

  function render() {
    updateCounts();
    const main    = document.getElementById('fav-main');
    const filtered = getFiltered();
    main.innerHTML = '';

    if (filtered.length === 0) {
      const msg = activeTab === 'fav'
        ? 'Nenhuma questão favoritada ainda.<br>Clique na estrela ★ em qualquer questão para salvá-la aqui.'
        : 'Nenhuma questão encontrada para os filtros selecionados.';
      main.innerHTML = `
        <div class="empty-state">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
            <path d="M12 2l3.1 6.3 6.9 1-5 4.9 1.2 6.8L12 17.8l-6.2 3.2 1.2-6.8L2 9.3l6.9-1L12 2z"/>
          </svg>
          <p>${msg}</p>
        </div>`;
      return;
    }

    // Agrupar por capítulo
    const byChapter = {};
    filtered.forEach(q => {
      const k = q.chapterId;
      if (!byChapter[k]) byChapter[k] = { name: q.chapterName, questions: [] };
      byChapter[k].questions.push(q);
    });

    Object.entries(byChapter)
      .sort((a, b) => Number(a[0]) - Number(b[0]))
      .forEach(([chapId, { name, questions }]) => {
        // Separator
        const sep = document.createElement('div');
        sep.className = 'chapter-sep';
        sep.innerHTML = `
          <div class="chapter-sep-line"></div>
          <span class="chapter-sep-label">Cap. ${chapId} · ${name}</span>
          <div class="chapter-sep-line"></div>`;
        main.appendChild(sep);

        questions.forEach((q, i) => {
          const card = buildCard(q, i);
          main.appendChild(card);
        });
      });
  }

  // ── Build card ──────────────────────────
  function buildCard(q, delay) {
    const isFav = favorites.has(q.uid);
    const letters = ['A','B','C','D','E'];

    const card = document.createElement('div');
    card.className = 'q-card' + (isFav ? ' favorited' : '');
    card.style.animationDelay = Math.min(delay, 8) * 0.04 + 's';

    const altsHTML = q.alternatives.map((alt, i) => {
      const letter = letters[i];
      const isCorrect = letter === q.answer.toUpperCase();
      return `<li class="alt-row ${isCorrect ? 'correct-alt' : ''}">
        <span class="alt-badge">${letter}</span>
        <span>${alt}</span>
      </li>`;
    }).join('');

    const justHTML = q.justification
      ? `<div class="justification-box"><p class="just-label">Justificativa</p><p>${q.justification}</p></div>`
      : '';

    card.innerHTML = `
      <div class="q-card-top">
        <div class="q-card-meta">
          <div class="q-card-tags">
            <span class="tag-chapter">Cap. ${q.chapterId}</span>
            <span class="tag-id">#${q.uid}</span>
          </div>
          <p class="q-command">${q.command}</p>
        </div>
        <button class="btn-star ${isFav ? 'starred' : ''}" data-uid="${q.uid}" title="${isFav ? 'Remover dos favoritos' : 'Adicionar aos favoritos'}">
          <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
            <path d="M10 2l2.4 5 5.6.8-4 3.9.9 5.3L10 14.5l-4.9 2.5.9-5.3L2 7.8l5.6-.8L10 2z"
              stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <button class="q-expand-toggle" data-uid="${q.uid}">
        <svg width="14" height="14" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Ver alternativas e gabarito
        <svg class="toggle-icon" width="14" height="14" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="q-details" data-uid="${q.uid}">
        <ul class="alt-list">${altsHTML}</ul>
        ${justHTML}
      </div>`;

    // Star click
    card.querySelector('.btn-star').addEventListener('click', e => {
      e.stopPropagation();
      toggleFavorite(q.uid, card);
    });

    // Expand click
    card.querySelector('.q-expand-toggle').addEventListener('click', () => {
      const details = card.querySelector('.q-details');
      const toggle  = card.querySelector('.q-expand-toggle');
      const open    = details.classList.toggle('open');
      toggle.classList.toggle('open', open);
      toggle.innerHTML = open
        ? `<svg width="14" height="14" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
           Ocultar
           <svg class="toggle-icon open" width="14" height="14" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`
        : `<svg width="14" height="14" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
           Ver alternativas e gabarito
           <svg class="toggle-icon" width="14" height="14" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    });

    return card;
  }

  function toggleFavorite(uid, card) {
    if (favorites.has(uid)) {
      favorites.delete(uid);
      card.classList.remove('favorited');
      const btn = card.querySelector('.btn-star');
      btn.classList.remove('starred');
      btn.title = 'Adicionar aos favoritos';
      btn.querySelector('svg path').setAttribute('fill', 'none');
    } else {
      favorites.add(uid);
      card.classList.add('favorited');
      const btn = card.querySelector('.btn-star');
      btn.classList.add('starred');
      btn.title = 'Remover dos favoritos';
    }
    saveFavorites();
    updateCounts();
    // Se estiver na aba de favoritos, remover o card com animação
    if (activeTab === 'fav' && !favorites.has(uid)) {
      card.style.transition = 'opacity .25s, transform .25s';
      card.style.opacity = '0';
      card.style.transform = 'translateX(12px)';
      setTimeout(() => render(), 280);
    }
  }

  // ── Event listeners ─────────────────────
  document.getElementById('view-tabs').addEventListener('click', e => {
    const tab = e.target.closest('.view-tab');
    if (!tab) return;
    activeTab = tab.dataset.tab;
    document.querySelectorAll('.view-tab').forEach(t => t.classList.toggle('active', t === tab));
    render();
  });

  document.getElementById('search-input').addEventListener('input', e => {
    searchQuery = e.target.value.trim();
    render();
  });

  // ── Init ─────────────────────────────────
  loadData();
  </script>
</body>
</html>
